[project]
name = "docling-agent"
version = "0.1.0"  # DO NOT EDIT, updated automatically
description = "A python library to simplify agentic operations on documents, such as writing, editing, summarizing, extracting, and enriching."
license = "MIT"
license-files = ["LICENSE"]
keywords = ["docling", "agent", "agentic", "document processing", "writing", "editing", "extraction", "enrichment", "summarization"]
readme = "README.md"
authors = [
    {name="Peter Staar", email="taa@zurich.ibm.com"},
]
maintainers = [
    {name="Michele Dolfi", email="dol@zurich.ibm.com"},
    {name="Cesar Berrospi Ramis", email="ceb@zurich.ibm.com"},
    {name="Panos Vagenas", email="pva@zurich.ibm.com"},
    {name="Christoph Auer", email="cau@zurich.ibm.com"},
    {name="Peter Staar", email="taa@zurich.ibm.com"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "docling>=2.61.0",
    "docling-core>=2.70.2",
    "pydantic~=2.10",
    "pydantic-settings~=2.4",
    "typer>=0.12.5",
    "pyyaml>=6.0",
    "boto3~=1.35",
    "pandas~=2.2",
    "fastparquet~=2024.11",
    "pyarrow~=19.0",
    "httpx~=0.28",
    "mellea>=0.3",
]

[project.optional-dependencies]
vlm = [
    "docling[vlm]~=2.53",
]

[dependency-groups]
dev = [
    "coverage>=7.8.0",
    "mypy~=1.11",
    "pre-commit~=3.8",
    "pytest~=8.3",
    "pytest-asyncio~=0.24",
    "pytest-check~=2.4",
    "pytest-cov>=6.1.1",
    "python-semantic-release~=7.32",
    "boto3-stubs[s3]~=1.35",
    "ruff>=0.9.6",
    "types-pyyaml>=6.0.12.20250915",
    "types-tabulate>=0.10.0.20260308",
]

[project.scripts]
docling-agent = "docling_agent.cli:app"

[project.urls]
homepage = "https://github.com/docling-project"
repository = "https://github.com/docling-project/docling-agent"
issues = "https://github.com/docling-project/docling-agent/issues"
changelog = "https://github.com/docling-project/docling-agent/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.metadata]
# Allow direct URL/Git references in project.dependencies
allow-direct-references = true

[tool.hatch.build.targets.sdist]
include = ["docling_agent"]

[tool.ruff]
target-version = "py310"
line-length = 120
respect-gitignore = true
exclude = [
    "tests/data/**"
]

[tool.ruff.format]
skip-magic-trailing-comma = false

[tool.ruff.lint]
select = [
  "C",     # flake8-comprehensions
  "C9",    # mccabe
  "E",     # pycodestyle errors (default)
  "F",     # pyflakes (default)
  "I",     # isort
  "PD",    # pandas-vet
  "PIE",   # pie
  "Q",     # flake8-quotes
  "RUF",   # Enable all ruff-specific checks
  "S307",  # eval
  "W",     # pycodestyle warnings
  "ASYNC", # async
  "UP",    # pyupgrade
]

ignore = [
  "C408",   # Unnecessary `dict()` call (rewrite as a literal)
  "E501",   # Line too long, handled by ruff formatter
  "E741",   # Ambiguous variable name: `l`
  "D107",   # "Missing docstring in __init__",
  "PL",     # Pylint
  "RUF005", # Consider ... instead of concatenation
  "RUF012", # Mutable Class Attributes
]

[tool.ruff.lint.pep8-naming]
classmethod-decorators = [
  "classmethod",
  "validator",
  "pydantic.validator",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]
"tests/*.py" = ["ASYNC"]  # Disable ASYNC check for tests
"*.ipynb" = ["I"]  # Disable import sorting for notebooks

[tool.ruff.lint.mccabe]
max-complexity = 30

[tool.ruff.lint.isort]
combine-as-imports = false

[tool.mypy]
pretty = true
no_implicit_optional = true
namespace_packages = true
show_error_codes = true
python_version = "3.10"
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "boto3.*",
    "botocore.*",
    "easyocr.*",
    "tesserocr.*",
    "rapidocr_onnxruntime.*",
    "kfp.*",
    "kfp_server_api.*",
    "pandas.*",
    "msgpack.*",
    "mlx_vlm.*",
    "googleapiclient.*", 
    "google_auth_oauthlib.*",
    "mellea.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
minversion = "8.2"
testpaths = [
    "tests",
]
addopts = "-rA --color=yes --tb=short --maxfail=5"
markers = [
"asyncio",
"slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.semantic_release]
# for default values check:
# https://github.com/python-semantic-release/python-semantic-release/blob/v7.32.2/semantic_release/defaults.cfg

version_source = "tag_only"
branch = "main"

# configure types which should trigger minor and patch version bumps respectively
# (note that they must be a subset of the configured allowed types):
parser_angular_allowed_types = "build,chore,ci,docs,feat,fix,perf,style,refactor,test"
parser_angular_minor_types = "feat"
parser_angular_patch_types = "fix,perf"
