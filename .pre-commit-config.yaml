fail_fast: true
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        name: "Ruff linter"
        args: [--exit-non-zero-on-fix, --fix, --config=pyproject.toml]
        files: '^(docling_agent|tests|examples).*\.(py|ipynb)$'
      - id: ruff-format
        name: "Ruff formatter"
        args: [--exit-non-zero-on-fix, --config=pyproject.toml]
        files: '^(docling_agent|tests|examples).*\.(py|ipynb)$'
  - repo: local
    hooks:
      - id: mypy
        name: MyPy
        entry: uv run --no-sync mypy docling_agent
        pass_filenames: false
        language: system
        files: '\.py$'
  - repo: local
    hooks:
      - id: pytest
        name: Pytest
        entry: uv run --no-sync pytest -m "not slow" --cov=docling_agent --cov-report=xml tests
        pass_filenames: false
        language: system
        files: '\.py$'
  - repo: local
    hooks:
      - id: uv-lock
        name: "uv lockfile"
        entry: uv lock
        pass_filenames: false
        language: system
