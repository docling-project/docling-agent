fail_fast: true
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: "Ruff linter"
        entry: uv run --no-sync ruff check --exit-non-zero-on-fix --fix --config=pyproject.toml
        language: system
        files: '^(docling_agent|tests|examples).*\.(py|ipynb)$'
        pass_filenames: false
      - id: ruff-format
        name: "Ruff formatter"
        entry: uv run --no-sync ruff format --config=pyproject.toml
        language: system
        files: '^(docling_agent|tests|examples).*\.(py|ipynb)$'
        pass_filenames: false
  - repo: local
    hooks:
      - id: mypy
        name: MyPy
        entry: uv run --no-sync mypy docling_agent
        pass_filenames: false
        language: system
        files: '\.py$'
  - repo: local
    hooks:
      - id: pytest
        name: Pytest
        entry: uv run --no-sync pytest -m "not slow" --cov=docling_agent --cov-report=xml tests
        pass_filenames: false
        language: system
        files: '\.py$'
  - repo: local
    hooks:
      - id: uv-lock
        name: "uv lockfile"
        entry: uv lock
        pass_filenames: false
        language: system
